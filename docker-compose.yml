services:
  backend:
    build:
      context: ./backend
    container_name: lifeos-backend
    env_file:
      - ./backend/.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  frontend:
    profiles: ["dev"]
    build:
      context: ./frontend
    container_name: lifeos-frontend
    restart: unless-stopped
